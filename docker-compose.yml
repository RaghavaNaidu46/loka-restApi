services:
  postgres:
    image: postgres:16-alpine
    container_name: loka_postgres
    environment:
      POSTGRES_USER: loka
      POSTGRES_PASSWORD: loka_secret
      POSTGRES_DB: loka_db
    ports:
      - "5432:5432"
    volumes:
      - loka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loka -d loka_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loka_redis
    ports:
      - "6379:6379"
    volumes:
      - loka_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: loka_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  loka_postgres_data:
  loka_redis_data:
